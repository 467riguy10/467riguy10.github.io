<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xenon</title>
    <link rel="icon" type="image/png" href="/images/gc.png">
    <meta name="description" content="Xenon — A sleek, modern hub for games, apps, and more.">
    <meta name="keywords" content="Xenon, Games, Apps, Hub">
    <meta name="author" content="Xenon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0a0f;
            --bg-card: #12121a;
            --bg-hover: #1a1a28;
            --accent: #00d4ff;
            --accent-glow: rgba(0, 212, 255, 0.3);
            --accent-secondary: #7c3aed;
            --text-primary: #e8e8f0;
            --text-secondary: #8b8ba3;
            --border: rgba(255, 255, 255, 0.06);
            --nav-width: 80px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-deep);
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated background grid */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        /* Floating orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
            animation: floatOrb 20s ease-in-out infinite;
        }
        .orb-1 {
            width: 400px; height: 400px;
            background: rgba(0, 212, 255, 0.08);
            top: -100px; right: -100px;
            animation-delay: 0s;
        }
        .orb-2 {
            width: 300px; height: 300px;
            background: rgba(124, 58, 237, 0.08);
            bottom: -80px; left: 100px;
            animation-delay: -7s;
        }
        .orb-3 {
            width: 250px; height: 250px;
            background: rgba(0, 212, 255, 0.05);
            top: 40%; left: 30%;
            animation-delay: -14s;
        }
        @keyframes floatOrb {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -40px) scale(1.1); }
            66% { transform: translate(-20px, 30px) scale(0.95); }
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            height: 100vh;
            width: var(--nav-width);
            background: rgba(18, 18, 26, 0.85);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 0;
            z-index: 100;
            transition: width 0.3s ease;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 22px;
            color: var(--accent);
            text-shadow: 0 0 20px var(--accent-glow);
            margin-bottom: 40px;
            letter-spacing: 2px;
            cursor: default;
            user-select: none;
        }

        .nav-links {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
            padding: 0 12px;
            flex: 1;
        }

        .nav-links li {
            width: 100%;
        }

        .nav-links a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 48px;
            border-radius: 14px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 20px;
            position: relative;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }

        .nav-links a::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--accent);
            opacity: 0;
            border-radius: 14px;
            transition: opacity 0.25s ease;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--accent);
            background: var(--bg-hover);
            box-shadow: 0 0 20px var(--accent-glow), inset 0 0 0 1px rgba(0, 212, 255, 0.15);
        }

        .nav-links a:hover::before,
        .nav-links a.active::before {
            opacity: 0.08;
        }

        .nav-links a i {
            position: relative;
            z-index: 1;
            transition: transform 0.25s ease;
        }

        .nav-links a:hover i {
            transform: scale(1.15);
        }

        /* Tooltip */
        .nav-links a::after {
            content: attr(data-label);
            position: absolute;
            left: calc(100% + 16px);
            top: 50%;
            transform: translateY(-50%) translateX(-8px);
            background: var(--bg-card);
            color: var(--text-primary);
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            border: 1px solid var(--border);
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            transition: all 0.2s ease;
            letter-spacing: 0.5px;
        }

        .nav-links a:hover::after {
            opacity: 1;
            transform: translateY(-50%) translateX(0);
        }

        /* Divider */
        .nav-divider {
            width: 32px;
            height: 1px;
            background: var(--border);
            margin: 12px 0;
        }

        /* Main Content */
        .main {
            margin-left: var(--nav-width);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1;
            padding: 40px;
        }

        .hero {
            text-align: center;
            max-width: 700px;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            background: rgba(0, 212, 255, 0.08);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 100px;
            font-size: 12px;
            font-weight: 500;
            color: var(--accent);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 32px;
            animation: fadeInUp 0.8s ease forwards;
        }

        .hero-badge .pulse {
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        .hero h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(48px, 8vw, 96px);
            font-weight: 900;
            line-height: 1.05;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #ffffff 0%, #00d4ff 50%, #7c3aed 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: fadeInUp 0.8s ease 0.15s both;
            letter-spacing: -1px;
        }

        .hero p {
            font-size: 18px;
            color: var(--text-secondary);
            line-height: 1.7;
            max-width: 500px;
            margin: 0 auto 40px;
            animation: fadeInUp 0.8s ease 0.3s both;
        }

        .hero-actions {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
            animation: fadeInUp 0.8s ease 0.45s both;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 32px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            border: none;
            font-family: 'Inter', sans-serif;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
            color: #fff;
            box-shadow: 0 4px 30px rgba(0, 212, 255, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 40px rgba(0, 212, 255, 0.4);
        }

        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--bg-hover);
            border-color: rgba(0, 212, 255, 0.2);
            transform: translateY(-2px);
        }

        /* Stats row */
        .stats {
            display: flex;
            gap: 48px;
            margin-top: 60px;
            animation: fadeInUp 0.8s ease 0.6s both;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            font-weight: 700;
            color: var(--accent);
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 4px;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Scroll indicator */
        .scroll-hint {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            animation: bounce 2s ease-in-out infinite;
        }

        .scroll-hint i {
            font-size: 16px;
        }

        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(8px); }
        }

        /* Responsive */
        @media (max-width: 640px) {
            .sidebar {
                width: 100%;
                height: 64px;
                flex-direction: row;
                padding: 0 20px;
                bottom: 0;
                top: auto;
                border-right: none;
                border-top: 1px solid var(--border);
            }
            .logo { display: none; }
            .nav-links {
                flex-direction: row;
                justify-content: space-around;
                padding: 0;
                gap: 0;
            }
            .nav-links a {
                width: 48px;
                height: 48px;
            }
            .nav-links a::after { display: none; }
            .nav-divider { display: none; }
            .main {
                margin-left: 0;
                margin-bottom: 64px;
                padding: 24px;
            }
            .stats { gap: 24px; }
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <aside class="sidebar">

    <main class="main">

            <div class="stat">

            </div>

        <div class="scroll-hint">
            <span>Scroll</span>

        </div>
    </main>
</body>
</html>
