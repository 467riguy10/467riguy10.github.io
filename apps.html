<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xenon — Apps</title>
    <link rel="icon" type="image/png" href="/images/gc.png">
    <meta name="description" content="Xenon Apps — Browse and launch your favorite apps.">
    <meta name="keywords" content="Xenon, Apps, Hub">
    <meta name="author" content="Xenon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0a0f;
            --bg-card: #12121a;
            --bg-hover: #1a1a28;
            --accent: #00d4ff;
            --accent-glow: rgba(0, 212, 255, 0.3);
            --accent-secondary: #7c3aed;
            --text-primary: #e8e8f0;
            --text-secondary: #8b8ba3;
            --border: rgba(255, 255, 255, 0.06);
            --nav-width: 80px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-deep);
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
            animation: floatOrb 20s ease-in-out infinite;
        }
        .orb-1 {
            width: 400px; height: 400px;
            background: rgba(0, 212, 255, 0.08);
            top: -100px; right: -100px;
            animation-delay: 0s;
        }
        .orb-2 {
            width: 300px; height: 300px;
            background: rgba(124, 58, 237, 0.08);
            bottom: -80px; left: 100px;
            animation-delay: -7s;
        }
        .orb-3 {
            width: 250px; height: 250px;
            background: rgba(0, 212, 255, 0.05);
            top: 40%; left: 30%;
            animation-delay: -14s;
        }
        @keyframes floatOrb {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -40px) scale(1.1); }
            66% { transform: translate(-20px, 30px) scale(0.95); }
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            height: 100vh;
            width: var(--nav-width);
            background: rgba(18, 18, 26, 0.85);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 0;
            z-index: 100;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 22px;
            color: var(--accent);
            text-shadow: 0 0 20px var(--accent-glow);
            margin-bottom: 40px;
            letter-spacing: 2px;
            cursor: default;
            user-select: none;
        }

        .nav-links {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
            padding: 0 12px;
            flex: 1;
        }

        .nav-links li { width: 100%; }

        .nav-links a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 48px;
            border-radius: 14px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 20px;
            position: relative;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }

        .nav-links a::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--accent);
            opacity: 0;
            border-radius: 14px;
            transition: opacity 0.25s ease;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--accent);
            background: var(--bg-hover);
            box-shadow: 0 0 20px var(--accent-glow), inset 0 0 0 1px rgba(0, 212, 255, 0.15);
        }

        .nav-links a:hover::before,
        .nav-links a.active::before {
            opacity: 0.08;
        }

        .nav-links a i {
            position: relative;
            z-index: 1;
            transition: transform 0.25s ease;
        }

        .nav-links a:hover i { transform: scale(1.15); }

        .nav-links a::after {
            content: attr(data-label);
            position: absolute;
            left: calc(100% + 16px);
            top: 50%;
            transform: translateY(-50%) translateX(-8px);
            background: var(--bg-card);
            color: var(--text-primary);
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            border: 1px solid var(--border);
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            transition: all 0.2s ease;
            letter-spacing: 0.5px;
        }

        .nav-links a:hover::after {
            opacity: 1;
            transform: translateY(-50%) translateX(0);
        }

        .nav-divider {
            width: 32px;
            height: 1px;
            background: var(--border);
            margin: 12px 0;
        }

        .main {
            margin-left: var(--nav-width);
            padding: 40px;
            position: relative;
            z-index: 1;
            min-height: 100vh;
        }

        .page-header {
            margin-bottom: 32px;
            animation: fadeInUp 0.6s ease both;
        }

        .page-header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 42px;
            font-weight: 900;
            background: linear-gradient(135deg, #ffffff 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
        }

        .page-header p {
            color: var(--text-secondary);
            font-size: 16px;
            margin-top: 8px;
        }

        .search-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 12px 20px;
            margin-bottom: 32px;
            max-width: 480px;
            transition: border-color 0.25s ease, box-shadow 0.25s ease;
            animation: fadeInUp 0.6s ease 0.1s both;
        }

        .search-bar:focus-within {
            border-color: rgba(0, 212, 255, 0.3);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .search-bar i {
            color: var(--text-secondary);
            font-size: 16px;
        }

        .search-bar input {
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            width: 100%;
        }

        .search-bar input::placeholder { color: var(--text-secondary); }

        /* Apps Grid */
        .apps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            animation: fadeInUp 0.6s ease 0.2s both;
        }

        .app-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 18px;
            overflow: hidden;
            text-decoration: none;
            color: var(--text-primary);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            cursor: pointer;
            display: block;
        }

        .app-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.06), rgba(124, 58, 237, 0.06));
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 1;
            pointer-events: none;
        }

        .app-card:hover {
            transform: translateY(-6px);
            border-color: rgba(0, 212, 255, 0.2);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4), 0 0 30px rgba(0, 212, 255, 0.08);
        }

        .app-card:hover::before { opacity: 1; }

        .app-card .thumb {
            width: 100%;
            aspect-ratio: 16 / 10;
            object-fit: cover;
            display: block;
            border-bottom: 1px solid var(--border);
            transition: transform 0.4s ease;
        }

        .app-card:hover .thumb { transform: scale(1.05); }

        .app-card .info {
            padding: 14px 16px;
            position: relative;
            z-index: 2;
        }

        .app-card p {
            font-size: 14px;
            font-weight: 600;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .app-card .launch-hint {
            font-size: 11px;
            color: var(--accent);
            margin-top: 4px;
            opacity: 0;
            transform: translateY(4px);
            transition: all 0.25s ease;
        }

        .app-card:hover .launch-hint {
            opacity: 1;
            transform: translateY(0);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 640px) {
            .sidebar {
                width: 100%;
                height: 64px;
                flex-direction: row;
                padding: 0 20px;
                bottom: 0;
                top: auto;
                border-right: none;
                border-top: 1px solid var(--border);
            }
            .logo { display: none; }
            .nav-links {
                flex-direction: row;
                justify-content: space-around;
                padding: 0;
                gap: 0;
            }
            .nav-links a {
                width: 48px;
                height: 48px;
            }
            .nav-links a::after { display: none; }
            .nav-divider { display: none; }
            .main {
                margin-left: 0;
                margin-bottom: 64px;
                padding: 24px;
            }
            .page-header h1 { font-size: 28px; }
            .apps-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <aside class="sidebar">
        <div class="logo">X</div>
        <ul class="nav-links">
            <li><a href="index" data-label="Home"><i class="fas fa-home"></i></a></li>
            <li><a href="games" data-label="Games"><i class="fas fa-gamepad"></i></a></li>
            <li><a href="apps" data-label="Apps" class="active"><i class="fas fa-layer-group"></i></a></li>
            <li><a href="links" data-label="Links"><i class="fa-solid fa-link"></i></a></li>
            <li><div class="nav-divider"></div></li>
            <li><a href="https://discord.gg/6GewnXsjwB" data-label="Discord" target="_blank"><i class="fa-brands fa-discord"></i></a></li>
            <li><a href="https://play.szvy.win/embed.html#https://www5.cbox.ws/box/?boxid=955149&boxtag=tkebzb" data-label="Chat" target="_blank"><i class="fa-brands fa-rocketchat"></i></a></li>
            <li><a href="partners" data-label="Partners"><i class="fas fa-handshake"></i></a></li>
            <li><a href="extra" data-label="Extra"><i class="fas fa-ellipsis"></i></a></li>
            <li><a href="settings" data-label="Settings"><i class="fa-solid fa-gear"></i></a></li>
        </ul>
    </aside>

    <main class="main">
        <div class="page-header">
            <h1>Apps</h1>
            <p>Launch your favorite apps instantly.</p>
        </div>

        <div class="search-bar">
            <i class="fas fa-search"></i>
            <input type="text" id="appSearch" placeholder="Search apps..." onkeyup="filterApps()">
        </div>

        <div class="apps-grid" id="appsGrid">
            <a href="a/snap" class="app-card">
                <img src="images/apps/snap.png" alt="Snap" class="thumb" onerror="this.style.display='none';this.parentElement.querySelector('.fallback').style.display='flex';">
                <div class="fallback" style="display:none;width:100%;aspect-ratio:16/10;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--accent),var(--accent-secondary));font-size:28px;"><i class="fas fa-camera" style="color:#fff;"></i></div>
                <div class="info"><p>Snap</p><div class="launch-hint">Click to Launch</div></div>
            </a>
            <a href="a/discord" class="app-card">
                <img src="images/apps/discord.png" alt="Discord" class="thumb" onerror="this.style.display='none';this.parentElement.querySelector('.fallback').style.display='flex';">
                <div class="fallback" style="display:none;width:100%;aspect-ratio:16/10;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--accent),var(--accent-secondary));font-size:28px;"><i class="fa-brands fa-discord" style="color:#fff;"></i></div>
                <div class="info"><p>Discord</p><div class="launch-hint">Click to Launch</div></div>
            </a>
        </div>
    </main>

    <script>
        function filterApps() {
            const query = document.getElementById('appSearch').value.toLowerCase();
            const cards = document.querySelectorAll('.app-card');
            cards.forEach(card => {
                const name = card.querySelector('p').textContent.toLowerCase();
                card.style.display = name.includes(query) ? '' : 'none';
            });
        }
    </script>
</body>
</html>
